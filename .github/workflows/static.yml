name: Deploy React app to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_RESUME_NAME: ${{ secrets.VITE_RESUME_NAME }}
          VITE_RESUME_EMAIL: ${{ secrets.VITE_RESUME_EMAIL }}
          VITE_RESUME_PHONE: ${{ secrets.VITE_RESUME_PHONE }}
          VITE_RESUME_GITHUB: ${{ secrets.VITE_RESUME_GITHUB }}
          VITE_RESUME_LINKEDIN: ${{ secrets.VITE_RESUME_LINKEDIN }}
          VITE_RESUME_WEBSITE: ${{ secrets.VITE_RESUME_WEBSITE }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
